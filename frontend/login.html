<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hostel Gate Pass - Login</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2d7a3a" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btn-spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes btn-spin { to { transform: rotate(360deg); } }
    .btn-primary:disabled { opacity: 0.82; cursor: not-allowed; transform: none !important; }
  </style>
</head>

<body class="auth-body">

  <!-- Header Logo -->
  <div class="auth-logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="10" fill="#2d7a3a"/>
      <path d="M18 6L7 12v14a3 3 0 003 3h16a3 3 0 003-3V12L18 6z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)" stroke-width="1.2"/>
      <path d="M14 29V20h8v9" fill="rgba(255,255,255,0.9)"/>
      <rect x="15.5" y="22" width="2" height="3" fill="#2d7a3a"/>
      <rect x="18.5" y="22" width="2" height="3" fill="#2d7a3a"/>
    </svg>
    <span class="auth-logo-text">Hostel</span>
  </div>

  <div class="auth-card">
    <!-- Icon -->
    <div class="auth-icon-wrap">
      <svg width="42" height="42" viewBox="0 0 44 44" fill="none">
        <rect x="8" y="12" width="28" height="20" rx="3" stroke="#2d7a3a" stroke-width="2.2" fill="none"/>
        <circle cx="17" cy="22" r="4" stroke="#2d7a3a" stroke-width="2" fill="none"/>
        <line x1="24" y1="19" x2="33" y2="19" stroke="#2d7a3a" stroke-width="2" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="31" y2="24" stroke="#2d7a3a" stroke-width="2" stroke-linecap="round"/>
        <rect x="16" y="8" width="12" height="6" rx="2" fill="#2d7a3a"/>
        <rect x="20" y="8" width="4" height="3" rx="1" fill="#fff"/>
      </svg>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-subtitle">Login to your account to continue</p>

    <div id="error-msg" class="error-msg" style="display:none"></div>

    <div class="field-wrap">
      <label>Register No</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="3" width="14" height="12" rx="2" stroke="#9ca3af" stroke-width="1.5"/>
            <circle cx="7" cy="9" r="2" stroke="#9ca3af" stroke-width="1.5"/>
            <line x1="10" y1="7.5" x2="15" y2="7.5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="10" y1="10.5" x2="13" y2="10.5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="text" id="registerNo" placeholder="Enter your register number" autocomplete="off" />
      </div>
    </div>

    <div class="field-wrap">
      <label>Username</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
            <circle cx="9" cy="6.5" r="3" stroke="#9ca3af" stroke-width="1.5"/>
            <path d="M3 15c0-3 2.5-5 6-5s6 2 6 5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </span>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="off" />
      </div>
    </div>

    <div class="field-wrap">
      <label>Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
            <rect x="4" y="8" width="10" height="7" rx="2" stroke="#9ca3af" stroke-width="1.5"/>
            <path d="M6 8V6a3 3 0 016 0v2" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="9" cy="11.5" r="1" fill="#9ca3af"/>
          </svg>
        </span>
        <input type="password" id="password" placeholder="Enter your password" />
        <button class="eye-btn" type="button" onclick="togglePwd('password',this)">
          <svg class="eye-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M1 9s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="#9ca3af" stroke-width="1.5"/>
            <circle cx="9" cy="9" r="2.5" stroke="#9ca3af" stroke-width="1.5"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="remember-row">
      <label class="check-label">
        <input type="checkbox" id="remember" />
        <span class="checkmark"></span>
        Remember me
      </label>
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      <span class="btn-spinner" id="login-spinner" style="display:none"></span>
      <svg class="btn-icon" id="login-icon" width="16" height="16" viewBox="0 0 18 18" fill="none">
        <rect x="4" y="8" width="10" height="7" rx="2" stroke="#fff" stroke-width="1.8"/>
        <path d="M6 8V6a3 3 0 016 0v2" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span id="login-label">Login</span>
    </button>

    <div class="divider"><span>or</span></div>

    <p class="auth-switch">Don't have an account? <a href="/signup.html">Sign Up</a></p>
  </div>

  <script src="/app.js"></script>
  <script>
    // Check saved credentials
    window.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('remember_creds');
      if (saved) {
        const creds = JSON.parse(saved);
        document.getElementById('registerNo').value = creds.registerNo || '';
        document.getElementById('username').value = creds.username || '';
        document.getElementById('remember').checked = true;
      }
      const token = localStorage.getItem('token');
      if (token && !window.location.pathname.includes('index')) {
        window.location.replace('/index.html');
      }
    });

    async function handleLogin() {
      const registerNo = document.getElementById('registerNo').value.trim();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const errDiv = document.getElementById('error-msg');
      errDiv.style.display = 'none';

      if ((!registerNo && !username) || !password) {
        showError('Please enter Register No or Username and password'); return;
      }

      const btn = document.getElementById('login-btn');
      const spinner = document.getElementById('login-spinner');
      const icon = document.getElementById('login-icon');
      const label = document.getElementById('login-label');
      btn.disabled = true;
      spinner.style.display = 'inline-block';
      icon.style.display = 'none';
      label.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ registerNo, username, password })
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.message);
          btn.disabled = false;
          spinner.style.display = 'none';
          icon.style.display = 'inline-block';
          label.textContent = 'Login';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        if (remember) localStorage.setItem('remember_creds', JSON.stringify({ registerNo, username }));
        else localStorage.removeItem('remember_creds');

        window.location.href = '/index.html';
      } catch (e) {
        showError('Network error. Please try again.');
        btn.disabled = false;
        spinner.style.display = 'none';
        icon.style.display = 'inline-block';
        label.textContent = 'Login';
      }
    }

    function showError(msg) {
      const e = document.getElementById('error-msg');
      e.textContent = msg;
      e.style.display = 'block';
    }
  </script>
</body>

</html>
