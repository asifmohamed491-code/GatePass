<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vmedulife</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff">
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" href="/icons/vm-icon.png" />
  <link rel="shortcut icon" type="image/png" href="/icons/vm-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/styles.css" />
</head>

<body class="app-body">

  <!-- ── NAVBAR (unchanged) ── -->
  <nav class="app-nav">
    <button class="nav-back" onclick="handleBack()">
      <img src="./assets/back-arrow (2).png" alt="">
    </button>
    <span class="nav-title">Hostel</span>
    <button class="nav-bell">
      <img src="./assets/bell-new.png" alt="bell">
    </button>
  </nav>

  <div class="app-scroll-wrap">

    <!-- ── GATE PASS DETAILS CARD ── -->
    <div class="card">
      <h2 class="card-title">Gate Pass Details</h2>

      <div class="field-wrap">
        <label>Name</label>
        <input type="text" id="gp-name" readonly class="input-readonly" placeholder="Loading..." />
      </div>

      <div class="date-grid">
        <div class="date-group">
          <label>Departure Date and Time</label>
          <div class="date-time-row">
            <div class="custom-date-wrap flex1">
              <select id="gp-departure-day" class="custom-date-select">
                <option value="">DD</option>
              </select>
              <select id="gp-departure-month" class="custom-date-select">
                <option value="">Month</option>
                <option value="0">January</option>
                <option value="1">February</option>
                <option value="2">March</option>
                <option value="3">April</option>
                <option value="4">May</option>
                <option value="5">June</option>
                <option value="6">July</option>
                <option value="7">August</option>
                <option value="8">September</option>
                <option value="9">October</option>
                <option value="10">November</option>
                <option value="11">December</option>
              </select>
              <select id="gp-departure-year" class="custom-date-select">
                <option value="">YYYY</option>
              </select>
            </div>
            <div class="time-field-wrap flex1">
              <input type="time" id="gp-departure-time" class="input-time" />
            </div>
          </div>
          <input type="hidden" id="gp-departure" />
          <span class="field-error" id="err-departure" style="display:none">Required</span>
        </div>
        <div class="date-group">
          <label>Return Date and Time</label>
          <div class="date-time-row">
            <div class="custom-date-wrap flex1">
              <select id="gp-return-day" class="custom-date-select">
                <option value="">DD</option>
              </select>
              <select id="gp-return-month" class="custom-date-select">
                <option value="">Month</option>
                <option value="0">January</option>
                <option value="1">February</option>
                <option value="2">March</option>
                <option value="3">April</option>
                <option value="4">May</option>
                <option value="5">June</option>
                <option value="6">July</option>
                <option value="7">August</option>
                <option value="8">September</option>
                <option value="9">October</option>
                <option value="10">November</option>
                <option value="11">December</option>
              </select>
              <select id="gp-return-year" class="custom-date-select">
                <option value="">YYYY</option>
              </select>
            </div>
            <div class="time-field-wrap flex1">
              <input type="time" id="gp-return-time" class="input-time" />
            </div>
          </div>
          <input type="hidden" id="gp-return" />
          <span class="field-error" id="err-return" style="display:none">Required</span>
        </div>
      </div>

      <div class="three-col">
        <div class="field-wrap">
          <label>Hostel</label>
          <div class="select-wrap">
            <select id="gp-hostel">
              <option value="">Select</option>
              <option>Boys Hostel</option>
              <option>Girls Hostel</option>
            </select>
            <svg class="select-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 5l4 4 4-4" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <span class="field-error" id="err-hostel" style="display:none">Required</span>
        </div>
        <div class="field-wrap">
          <label>Floor</label>
          <div class="select-wrap">
            <select id="gp-floor">
              <option value="">Select</option>
              <option>GROUND FLOOR</option>
              <option>FIRST FLOOR</option>
              <option>SECOND FLOOR</option>
              <option>THIRD FLOOR</option>
              <option>FOURTH FLOOR</option>
            </select>
            <svg class="select-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M3 5l4 4 4-4" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <span class="field-error" id="err-floor" style="display:none">Required</span>
        </div>
        <div class="field-wrap">
          <label>Room No</label>
          <input type="text" id="gp-room" placeholder="e.g. B-207" />
          <span class="field-error" id="err-room" style="display:none">Required</span>
        </div>
      </div>

      <div class="field-wrap">
        <label>Reason</label>
        <div class="select-wrap">
          <select id="gp-reason">
            <option value="">Select reason</option>
            <option>Purchase</option>
            <option>Personal Work</option>
            <option>Medical</option>
            <option>Family Visit</option>
            <option>Home Visit</option>
            <option>Outing</option>
            <option>Emergency</option>
            <option>Other</option>
          </select>
          <svg class="select-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5l4 4 4-4" stroke="#555" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <span class="field-error" id="err-reason" style="display:none">Required</span>
      </div>

      <div class="field-wrap">
        <label>Remark</label>
        <textarea id="gp-remark" rows="3" placeholder="Add remark..."></textarea>
      </div>
    </div>

    <!-- ── APPROVAL STATUS CARD ── -->
    <div class="card">
      <h2 class="card-title">Approval Status</h2>
      <div class="approval-table-header desktop-only">
        <div class="ah-level">Level</div>
        <div class="ah-name">Approver Name</div>
        <div class="ah-emp">Employee Name (Editable)</div>
        <div class="ah-status">Status</div>
        <div class="ah-date">Approved On</div>
        <div class="ah-remark">Remark</div>
        <div class="ah-action">Action</div>
      </div>
      <div id="approvers-list"></div>
    </div>

    <!-- ── RECENT GATE PASSES CARD ── -->
    <div class="card">
      <h2 class="card-title">Recent Gate Passes</h2>
      <div class="recent-table-header desktop-only">
        <div>Name</div>
        <div>Room No</div>
        <div>Reason</div>
        <div>Departure</div>
        <div>Return</div>
        <div>Status</div>
        <div>Updated On</div>
        <div></div>
      </div>
      <div id="recent-list">
        <div class="loading-text">Loading...</div>
      </div>
    </div>

    <div style="height:80px"></div>
  </div>

  <!-- ── BOTTOM BAR (unchanged) ── -->
  <div class="bottom-bar">
    <button class="btn-cancel" onclick="handleCancel()">Cancel</button>
    <button class="btn-save" id="save-btn" onclick="handleSaveWithLoading()">
      <span class="btn-spinner-save" id="save-spinner" style="display:none"></span>
      <span id="save-label">Save Changes</span>
    </button>
    <button class="btn-viewpass" onclick="handleViewPass()">View Gate Pass</button>
  </div>

  <!-- Gate Pass Modal Popup — NO onclick on overlay (close only via X button 4 times) -->
  <div id="gatepass-modal" class="modal-overlay" style="display:none">
    <div class="modal-container" id="modal-inner"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/app.js"></script>
  <script src="/dashboard.js"></script>
  <style>
    .btn-spinner-save {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btn-spin-save 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
      flex-shrink: 0;
    }
    @keyframes btn-spin-save { to { transform: rotate(360deg); } }
    .btn-save:disabled { opacity: 0.82; cursor: not-allowed; transform: none !important; }
  </style>
  <script>
    async function handleSaveWithLoading() {
      const btn = document.getElementById('save-btn');
      const spinner = document.getElementById('save-spinner');
      const label = document.getElementById('save-label');

      btn.disabled = true;
      spinner.style.display = 'inline-block';
      label.textContent = 'Saving...';

      const resetBtn = () => {
        btn.disabled = false;
        spinner.style.display = 'none';
        label.textContent = 'Save Changes';
      };

      try {
        // Patch fetch temporarily to detect when handleSave's API call completes
        const origFetch = window.fetch;
        let fetchDone = false;
        window.fetch = async (...args) => {
          try {
            const res = await origFetch(...args);
            fetchDone = true;
            window.fetch = origFetch;
            setTimeout(resetBtn, 300);
            return res;
          } catch(e) {
            fetchDone = true;
            window.fetch = origFetch;
            setTimeout(resetBtn, 300);
            throw e;
          }
        };

        handleSave();

        // Fallback: reset after 8s if fetch never fired (e.g. validation failure)
        setTimeout(() => {
          if (!fetchDone) {
            window.fetch = origFetch;
            resetBtn();
          }
        }, 8000);
      } catch(e) {
        resetBtn();
      }
    }
  </script>
</body>

</html>
