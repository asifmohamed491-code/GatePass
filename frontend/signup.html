<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hostel Gate Pass - Sign Up</title>
  <link rel="manifest" href="/manifest.json"/>
  <meta name="theme-color" content="#2d7a3a"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/styles.css"/>
  <style>
    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: btn-spin 0.65s linear infinite;
      flex-shrink: 0;
    }
    @keyframes btn-spin { to { transform: rotate(360deg); } }
    .btn-primary:disabled { opacity: 0.82; cursor: not-allowed; transform: none !important; }
  </style>
</head>
<body class="auth-body">

  <div class="auth-logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <rect width="36" height="36" rx="10" fill="#2d7a3a"/>
      <path d="M18 6L7 12v14a3 3 0 003 3h16a3 3 0 003-3V12L18 6z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.9)" stroke-width="1.2"/>
      <path d="M14 29V20h8v9" fill="rgba(255,255,255,0.9)"/>
      <rect x="15.5" y="22" width="2" height="3" fill="#2d7a3a"/>
      <rect x="18.5" y="22" width="2" height="3" fill="#2d7a3a"/>
    </svg>
    <span class="auth-logo-text">Hostel</span>
  </div>

  <div class="auth-card">
    <div class="auth-icon-wrap">
      <svg width="42" height="42" viewBox="0 0 44 44" fill="none">
        <circle cx="19" cy="18" r="6" stroke="#2d7a3a" stroke-width="2.2" fill="none"/>
        <path d="M7 36c0-5 5-9 12-9" stroke="#2d7a3a" stroke-width="2.2" stroke-linecap="round"/>
        <circle cx="34" cy="30" r="7" fill="none" stroke="#2d7a3a" stroke-width="2"/>
        <line x1="34" y1="27" x2="34" y2="33" stroke="#2d7a3a" stroke-width="2" stroke-linecap="round"/>
        <line x1="31" y1="30" x2="37" y2="30" stroke="#2d7a3a" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="auth-title">Create Account</h1>
    <p class="auth-subtitle">Sign up to create your hostel gate pass account</p>

    <div id="error-msg" class="error-msg" style="display:none"></div>
    <div id="success-msg" class="success-msg" style="display:none"></div>

    <div class="field-wrap">
      <label>Register No</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><rect x="2" y="3" width="14" height="12" rx="2" stroke="#9ca3af" stroke-width="1.5"/><circle cx="7" cy="9" r="2" stroke="#9ca3af" stroke-width="1.5"/><line x1="10" y1="7.5" x2="15" y2="7.5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/><line x1="10" y1="10.5" x2="13" y2="10.5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <input type="text" id="registerNo" placeholder="Enter your register number"/>
      </div>
    </div>

    <div class="field-wrap">
      <label>Full Name</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6.5" r="3" stroke="#9ca3af" stroke-width="1.5"/><path d="M3 15c0-3 2.5-5 6-5s6 2 6 5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <input type="text" id="fullName" placeholder="Enter name as in gate pass"/>
      </div>
    </div>

    <div class="field-wrap">
      <label>Username</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6.5" r="3" stroke="#9ca3af" stroke-width="1.5"/><path d="M3 15c0-3 2.5-5 6-5s6 2 6 5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <input type="text" id="username" placeholder="Choose a username"/>
      </div>
    </div>

    <div class="field-wrap">
      <label>Email Address</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="2" stroke="#9ca3af" stroke-width="1.5"/><path d="M2 6l7 5 7-5" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <input type="email" id="email" placeholder="Enter your email address"/>
      </div>
    </div>

    <div class="field-wrap">
      <label>Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><rect x="4" y="8" width="10" height="7" rx="2" stroke="#9ca3af" stroke-width="1.5"/><path d="M6 8V6a3 3 0 016 0v2" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <input type="password" id="password" placeholder="Create a password"/>
        <button class="eye-btn" type="button" onclick="togglePwd('password',this)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 9s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="#9ca3af" stroke-width="1.5"/><circle cx="9" cy="9" r="2.5" stroke="#9ca3af" stroke-width="1.5"/></svg>
        </button>
      </div>
    </div>

    <div class="field-wrap">
      <label>Confirm Password</label>
      <div class="input-icon-wrap">
        <span class="input-icon">
          <svg width="17" height="17" viewBox="0 0 18 18" fill="none"><rect x="4" y="8" width="10" height="7" rx="2" stroke="#9ca3af" stroke-width="1.5"/><path d="M6 8V6a3 3 0 016 0v2" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
        <input type="password" id="confirmPassword" placeholder="Confirm your password"/>
        <button class="eye-btn" type="button" onclick="togglePwd('confirmPassword',this)">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M1 9s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z" stroke="#9ca3af" stroke-width="1.5"/><circle cx="9" cy="9" r="2.5" stroke="#9ca3af" stroke-width="1.5"/></svg>
        </button>
      </div>
    </div>

    <label class="check-label" style="margin-bottom:20px; align-items:flex-start; flex-wrap:wrap; gap:0;">
      <input type="checkbox" id="terms" style="margin-top:2px; flex-shrink:0;"/>
      <span style="flex:1; line-height:1.6;">
        I agree to the <a href="#" class="green-link">Terms and Conditions</a> and <a href="#" class="green-link">Privacy Policy</a>
      </span>
    </label>

    <button class="btn-primary" id="signup-btn" onclick="handleSignup()">
      <span class="btn-spinner" id="signup-spinner" style="display:none"></span>
      <svg class="btn-icon" id="signup-icon" width="16" height="16" viewBox="0 0 18 18" fill="none"><circle cx="8" cy="7" r="4" stroke="#fff" stroke-width="1.8" fill="none"/><path d="M3 16c0-3 2.5-5 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><line x1="14" y1="12" x2="14" y2="17" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><line x1="11.5" y1="14.5" x2="16.5" y2="14.5" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span id="signup-label">Create Account</span>
    </button>

    <div class="divider"><span>or</span></div>
    <p class="auth-switch">Already have an account? <a href="/login.html">Login</a></p>
  </div>

  <script src="/app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const token = localStorage.getItem('token');
      if (token) window.location.href = '/index.html';
    });

    async function handleSignup() {
      const registerNo = document.getElementById('registerNo').value.trim();
      const fullName = document.getElementById('fullName').value.trim();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const terms = document.getElementById('terms').checked;

      if (!registerNo || !fullName || !username || !email || !password || !confirmPassword) {
        showError('All fields are required'); return;
      }
      if (password !== confirmPassword) { showError('Passwords do not match'); return; }
      if (!terms) { showError('Please agree to Terms and Conditions'); return; }

      const btn = document.getElementById('signup-btn');
      const spinner = document.getElementById('signup-spinner');
      const icon = document.getElementById('signup-icon');
      const label = document.getElementById('signup-label');
      btn.disabled = true;
      spinner.style.display = 'inline-block';
      icon.style.display = 'none';
      label.textContent = 'Creating account...';

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ registerNo, fullName, username, email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.message);
          btn.disabled = false;
          spinner.style.display = 'none';
          icon.style.display = 'inline-block';
          label.textContent = 'Create Account';
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/index.html';
      } catch(e) {
        showError('Network error. Please try again.');
        btn.disabled = false;
        spinner.style.display = 'none';
        icon.style.display = 'inline-block';
        label.textContent = 'Create Account';
      }
    }

    function showError(msg) {
      const e = document.getElementById('error-msg');
      e.textContent = msg;
      e.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }
  </script>
</body>
</html>
